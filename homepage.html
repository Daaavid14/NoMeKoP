<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomekop Bequest</title>
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="shortcut icon" href="backgrounds/pokemon-ball.png" type="image/x-icon">
</head>
<body>

    <!-- ================= NAVIGATION ================= -->
    <nav class="navbar">
        <div class="logo">
            <img src="/backgrounds/nomekop.png" alt="game logo">
        </div>

        <ul class="nav-links">
            <li><a href="#" id="navHome">Home</a></li>
            <li><a href="#" id="navMarketplace">Marketplace</a></li>
            <li><a href="#">Collection</a></li>
            <li><a href="#">Whitepaper</a></li>
        </ul>

        <button id="connectWalletBtn" class="wallet-btn">CONNECT WALLET</button>
    </nav>

    <!-- ================= HERO SECTION ================= -->
    <header class="hero" id="homeSection">

        <div class="hero-left">
            <img src="assets/sprites.png" alt="Pokemon Group">
        </div>

        <div class="hero-center">
            <h1 class="title">NOMEKOP</h1>
            <h1 class="title">BEQUEST</h1>
            <div class="hero-buttons">
                <a href="gameStructure/lobby.html">
                    <button class="btn play">PLAY GAMES</button>
                </a>
            </div>
            <p class="sub-text">Catch • Train • Battle • Trade</p>
        </div>

        <div class="hero-right">
            <img src="assets/kind1.png" alt="Trainer Red">
        </div>

    </header>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>© 2025 Nomekop Bequest. All rights reserved.</p>
    </footer>
</body>
</html>
